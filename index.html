<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
<title>萌宠管家</title>
<!-- PWA核心配置 手机APP化 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="pink">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui,"微软雅黑",sans-serif;
}
body {
  background: #fdf6f8;
  padding-bottom: 80px;
}
#mainNav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 52px;
  background: #fff;
  display: flex;
  z-index: 9999999;
  pointer-events: auto !important;
  -webkit-pointer-events: auto !important;
  box-shadow: 0 1px 6px #eee;
}
.navBtn {
  flex: 1;
  line-height: 52px;
  text-align: center;
  font-size: 15px;
  color: #666;
  cursor: pointer;
  user-select: none;
}
.navBtn.active {
  color: #ff5c8d;
  border-bottom: 3px solid #ff5c8d;
  font-weight: bold;
}
.main {margin-top: 58px;padding: 15px;}
.page {display: none;}
.page.show {display: block;}
.banner{width:100%;height:150px;border-radius:16px;background:linear-gradient(135deg,#ff9aaa,#ffccd5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:bold;margin-bottom:20px;}
.form-box{background:#fff;border-radius:14px;padding:18px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.form-item{margin-bottom:14px;}
.form-item label{display:block;font-size:14px;color:#555;margin-bottom:5px;}
.form-item input,.form-item select,.form-item textarea{width:100%;padding:11px;border:1px solid #eee;border-radius:10px;outline:none;font-size:14px;}
.btn{width:100%;background:linear-gradient(90deg,#ff5c8d,#ff7ba7);color:#fff;border:none;padding:12px;border-radius:10px;font-size:16px;cursor:pointer;margin-top:8px;}
.small-btn{background:#ccc;color:#333;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}
.service-item{padding:10px;border:1px solid #eee;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.order-item{background:#fff;padding:12px;border:10px;margin-bottom:10px;border-left:4px solid #ff5c8d;}
.post-item{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px;}
.pop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:99999999;}
.pop-box{background:#fff;width:80%;border-radius:16px;padding:25px;text-align:center;}
</style>
</head>
<body>

<div id="mainNav">
  <div class="navBtn active" onclick="showPage(0)">下单预约</div>
  <div class="navBtn" onclick="showPage(1)">宠友社区</div>
  <div class="navBtn" onclick="showPage(2)">商家后台</div>
</div>

<div class="main">
  <div class="page show" id="page0">
    <div class="banner">🐾 萌宠管家 上门贴心喂养</div>
    <div class="form-box"><h4>可选服务</h4><div id="serviceList"></div></div>
    <div class="form-box">
      <div class="form-item"><label>选择服务</label><select id="selService"></select></div>
      <div class="form-item"><label>昵称</label><input id="uName"></div>
      <div class="form-item"><label>手机号</label><input id="uPhone"></div>
      <div class="form-item"><label>上门地址</label><input id="uAddr"></div>
      <div class="form-item"><label>预约时间</label><input type="datetime-local" id="uTime"></div>
      <div class="form-item"><label>宠物备注</label><textarea id="uNote" rows="3"></textarea></div>
      <button class="btn" onclick="submitOrder()">提交预约</button>
    </div>
  </div>

  <div class="page" id="page1">
    <div class="banner">🐱 宠友交流社区</div>
    <div class="form-box">
      <div class="form-item"><label>发帖昵称</label><input id="pNick"></div>
      <div class="form-item"><label>分享内容</label><textarea id="pText" rows="4"></textarea></div>
      <button class="btn" onclick="addPost()">发布帖子</button>
    </div>
    <div id="postList"></div>
  </div>

  <div class="page" id="page2">
    <div class="banner">🔐 商家管理中心</div>
    <div id="loginBox" class="form-box" style="text-align:center;">
      <p>密码：123456</p >
      <input type="password" id="adminPwd">
      <br><br>
      <button class="btn" onclick="adminLogin()">登录</button>
    </div>
    <div id="adminPanel" style="display:none;">
      <div class="form-box"><h4>修改服务价格</h4><div id="priceEdit"></div></div>
      <div class="form-box">
        <h4>添加新服务</h4>
        <div class="form-item"><label>服务名称</label><input id="newName"></div>
        <div class="form-item"><label>价格(元)</label><input type="number" id="newPrice"></div>
        <button class="btn" onclick="addNewService()">添加</button>
      </div>
      <div class="form-box"><h4>全部订单</h4><div id="orderList"></div></div>
    </div>
  </div>

  <div class="pop" id="pop">
    <div class="pop-box">
      <h4 id="popText"></h4>
      <br>
      <button class="small-btn" onclick="closePop()">确定</button>
    </div>
  </div>
</div>

<script>
function getServices(){let d=localStorage.getItem("petServices");if(!d){let i=[{name:"喂猫铲屎换水",price:29},{name:"小型犬遛狗陪伴",price:39},{name:"多宠专人看护",price:59},{name:"毛发清洁护理",price:45}];localStorage.setItem("petServices",JSON.stringify(i));return i;}return JSON.parse(d);}
function saveServices(a){localStorage.setItem("petServices",JSON.stringify(a));}
function showPage(n){let b=document.querySelectorAll(".navBtn");b.forEach(x=>x.classList.remove("active"));b[n].classList.add("active");let p=document.querySelectorAll(".page");p.forEach(x=>x.classList.remove("show"));document.getElementById("page"+n).classList.add("show");if(n===0)renderServices();if(n===1)renderPosts();}
function renderServices(){let l=getServices(),h="",o="";l.forEach((s,i)=>{h+=`<div class="service-item">${s.name} <span>¥${s.price}/次</span></div>`;o+=`<option value="${i}">${s.name} ¥${s.price}</option>`;});document.getElementById("serviceList").innerHTML=h;document.getElementById("selService").innerHTML=o;}
function renderPriceEdit(){let l=getServices(),h="";l.forEach((s,i)=>{h+=`<div class="form-item"><label>${s.name}</label><input type="number" id="p_${i}" value="${s.price}"><button class="small-btn" onclick="savePrice(${i})">保存</button></div>`;});document.getElementById("priceEdit").innerHTML=h;}
function savePrice(i){let l=getServices(),v=document.getElementById("p_"+i).value;if(!v||v<=0){alert("请输入正确价格");return;}l[i].price=Number(v);saveServices(l);renderServices();renderPriceEdit();showPop("价格已保存");}
function addNewService(){let n=document.getElementById("newName").value.trim(),p=document.getElementById("newPrice").value;if(!n||!p||p<=0){alert("请填写完整");return;}let l=getServices();l.push({name:n,price:Number(p)});saveServices(l);document.getElementById("newName").value="";document.getElementById("newPrice").value="";renderServices();renderPriceEdit();showPop("新服务已添加");}
function getOrders(){return JSON.parse(localStorage.getItem("petOrders"))||[];}
